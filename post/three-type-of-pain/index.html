  <h1>人生：人的痛苦来自 3 种信念</h1>
  <time datetime=2021-11-20T09:11:56&#43;0800 class="post-date">Sat, Nov 20, 2021</time>
  <p>心理学家阿尔伯特.埃利斯说：</p>
<p>1.我必须要把事情做好，得到表扬，否则我就很烂。
2.别人必须喜欢我，必须对我好，或者对我公平。否则就很糟糕。
3.世上的事情必须是容易的，一切都必须和我想象得样。否则就太糟糕了。</p>
